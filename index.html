<!DOCTYPE html>
<html>
<head>
  <title>A Question For You</title>

  <style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    height: 100vh;
    overflow: hidden;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: Arial, sans-serif;
    background: linear-gradient(-45deg, #0f172a, #1e1b4b, #312e81, #0f172a);
    background-size: 400% 400%;
    animation: gradientShift 12s ease infinite;
    color: white;
    position: relative;
  }

  .background-blur {
    position: absolute;
    width: 500px;
    height: 500px;
    background: rgba(255, 105, 180, 0.15);
    border-radius: 50%;
    filter: blur(100px);
    top: -100px;
    left: -100px;
    animation: float1 8s ease-in-out infinite;
  }

  .background-blur2 {
    position: absolute;
    width: 400px;
    height: 400px;
    background: rgba(59, 130, 246, 0.15);
    border-radius: 50%;
    filter: blur(100px);
    bottom: -100px;
    right: -100px;
    animation: float2 10s ease-in-out infinite;
  }

  .box {
    position: relative;
    z-index: 2;
    text-align: center;
    padding: 40px;
    border-radius: 24px;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(10px);
    box-shadow: 0 0 40px rgba(0,0,0,0.3);
    max-width: 600px;
  }

  h1 {
    font-size: 42px;
    margin-bottom: 20px;
  }

  p {
    font-size: 18px;
    opacity: 0.9;
  }

  button {
    margin-top: 30px;
    padding: 14px 28px;
    border: none;
    border-radius: 12px;
    font-size: 18px;
    cursor: pointer;
    background: white;
    color: black;
    transition: 0.3s;
  }

  button:hover {
    transform: scale(1.05);
  }

  #message {
    margin-top: 25px;
    font-size: 28px;
    display: none;
  }

  @keyframes gradientShift {
    0% {
      background-position: 0% 50%;
    }
    50% {
      background-position: 100% 50%;
    }
    100% {
      background-position: 0% 50%;
    }
  }

  @keyframes float1 {
    0%, 100% {
      transform: translateY(0px);
    }
    50% {
      transform: translateY(40px);
    }
  }

  @keyframes float2 {
    0%, 100% {
      transform: translateY(0px);
    }
    50% {
      transform: translateY(-40px);
    }
  }
  </style>
</head>

<body>
  <div class="background-blur"></div>
<div class="background-blur2"></div>
  <div class="box">
    <h1>Initializing Girlfriend Application...</h1>
    <p>Status: Candidate is suspiciously amazing.</p>

    <button onclick="showMessage()">
      Run Program
    </button>

    <div id="message">
      Will you be my girlfriend? :)
    </div>
  </div>

  <script>
    function showMessage() {
      document.getElementById("message").style.display = "block";
    }
  </script>
</body>
</html>
